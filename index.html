<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>匠心老街 · 焕青计划</title>
<meta name="description" content="一条等你点灯的老街 —— 乡村工匠焕青计划">
<link rel="stylesheet" href="css/style.css?v=23">
</head>
<body class="dusk">
<div id="frame">
  <div id="app">
    <header id="topbar">
      <button id="btn-sound" class="icon-btn" aria-label="声音开关">🔇</button>
      <button id="btn-help" class="icon-btn" aria-label="青石坞志">📖</button>
      <div id="lantern-count" class="count-chip" hidden>🏮 <span>0</span>/10</div>
      <div id="points-chip" class="count-chip" hidden>✨ <span>0</span></div>
      <div id="coins-chip" class="count-chip" hidden>🪙 <span>0</span></div>
      <button id="btn-bag" class="icon-btn" aria-label="印章袋" hidden>👝</button>
    </header>
    <main id="scene"></main>
    <div id="ambient" aria-hidden="true"></div>
    <div id="toast" hidden></div>
    <div id="overlay" hidden></div>
  </div>
</div>
<script src="js/data.js?v=16"></script>
<script src="js/store.js?v=13"></script>
<script src="js/audio.js?v=4"></script>
<script src="js/interactions.js?v=3"></script>
<script src="js/poster.js?v=6"></script>
<script src="js/juice.js?v=1"></script>
<script src="js/craft-mini.js?v=3"></script>
<script src="js/app.js?v=26"></script>
</body>
</html>
